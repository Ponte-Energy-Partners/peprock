name: Release

run-name: ${{ github.actor }} is releasing peprock 🚀

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      increment:
        description: 'Increment'
        type: choice
        options:
          - ""
          - "MAJOR"
          - "MINOR"
          - "PATCH"

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      UV_PYTHON_PREFERENCE: only-system
    timeout-minutes: 5

    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${GITHUB_REF} and your repository is ${{ github.repository }}."
        env:
          GITHUB_REF: ${{ github.ref }}
      - name: Check out repository code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: uv
        name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: "pyproject.toml"
      - id: cz
        name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff  # 0.27.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          increment: ${{ inputs.increment }}
          check_consistency: true
      - name: Build package
        run: uv build
      - name: Release to GitHub
        run: >
          gh release create ${CZ_VERSION}
          --generate-notes
          --verify-tag
          dist/peprock-${CZ_VERSION}.tar.gz
          dist/peprock-${CZ_VERSION}-py3-none-any.whl
        env:
          CZ_VERSION: ${{ steps.cz.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish peprock 📦 to Test PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false
      - name: Publish peprock 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - name: Build documentation
        run: uv run pdoc --html peprock
      - name: Upload documentation
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: "html/peprock"
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
      - run: echo "🍏 This job's status is ${JOB_STATUS}."
        env:
          JOB_STATUS: ${{ job.status }}
